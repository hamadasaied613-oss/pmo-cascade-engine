          cat > "$PROJECT/app/build.gradle" << 'GRADLE_APP'
plugins { id 'com.android.application' }
android {
    namespace 'com.pmo.cascade.sovereign'
    compileSdk 34
    defaultConfig {
        applicationId "com.pmo.cascade.sovereign"
        minSdk 24
