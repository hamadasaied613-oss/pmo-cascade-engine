          cat > "$PROJECT/settings.gradle" << 'SETTINGS'
rootProject.name = "PMO_Cascade"
include ':app'
SETTINGS

          cat > "$PROJECT/gradle/wrapper/gradle-wrapper.properties" << 'WRAPPER'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
WRAPPER

          # Generate Gradle wrapper
          cd "$PROJECT"
          gradle wrapper --gradle-version 8.2 2>/dev/null || true

          # Build
          cd "$PROJECT"
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug --no-daemon 2>&1

          # Copy APK
          find "$PROJECT" -name "*.apk" -exec cp {} "$OUTPUT_DIR/${APP_NAME}_v2.0.apk" \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PMO_Cascade_APK
          path: build_output/*.apk