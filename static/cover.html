<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>PMO CASCADE Cover</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;display:flex;align-items:center;justify-content:center;height:720px;width:1280px;font-family:'Segoe UI',sans-serif;overflow:hidden}
.cover{width:1280px;height:720px;background:linear-gradient(135deg,#0a0a0f 0%,#0d1117 30%,#0a1628 60%,#0a0a0f 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.cover::before{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,180,216,.08),transparent 70%)}
.cover::after{content:'';position:absolute;bottom:-150px;left:-150px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(6,214,160,.06),transparent 70%)}
.grid-line{position:absolute;width:100%;height:100%;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:60px 60px}
.badge{position:absolute;top:30px;padding:8px 24px;background:rgba(0,180,216,.1);border:1px solid rgba(0,180,216,.3);border-radius:20px;font-size:13px;color:#00B4D8;letter-spacing:2px;font-weight:600}
.badge span{color:rgba(255,255,255,.4);font-weight:400}
.content{text-align:center;z-index:1;padding:40px}
.logo{width:64px;height:64px;margin:0 auto 30px;background:linear-gradient(135deg,#00B4D8,#06D6A0);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;box-shadow:0 10px 40px rgba(0,180,216,.3)}
h1{font-size:48px;font-weight:800;color:#fff;letter-spacing:-1px;margin-bottom:8px}
h1 span{background:linear-gradient(135deg,#00B4D8,#06D6A0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:20px;color:#8888a0;margin-bottom:30px;letter-spacing:.5px}
.tags{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:30px}
.tag{padding:8px 18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;font-size:13px;color:#aaa}
.price{font-size:36px;font-weight:700;color:#fff;margin-bottom:6px}
.price span{font-size:16px;color:#8888a0;font-weight:400}
.footer{position:absolute;bottom:30px;font-size:12px;color:#555;letter-spacing:1px}
</style>
</head>
<body>
<div class="cover">
  <div class="grid-line"></div>
  <div class="badge">SOVEREIGN ENGINE <span>v2.0</span></div>
  <div class="content">
    <div class="logo">C</div>
    <h1>PMO <span>CASCADE</span></h1>
    <div class="sub">UAE Real Estate Feasibility Platform</div>
    <div class="tags">
      <span class="tag">Visual Catalog</span>
      <span class="tag">3D Model</span>
      <span class="tag">Quality AI</span>
      <span class="tag">BOQ &amp; Excel</span>
      <span class="tag">12 Domains</span>
    </div>
    <div class="price">$49 <span>one-time</span></div>
  </div>
  <div class="footer">Windows 10/11 · No installation required</div>
</div>
</body>
</html>
